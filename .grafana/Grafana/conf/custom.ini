; CalibraHub Grafana yapilandirmasi (auth-proxy + sub-path embed)
; grafana-setup.ps1 bu dosyayi {GrafanaHome}\conf\custom.ini olarak kopyalar
; ve yer tutuculari runtime degerleri ile degistirir.

[server]
http_addr = 127.0.0.1
http_port = 61005
domain = localhost
root_url = %(protocol)s://%(domain)s/grafana/
serve_from_sub_path = true
enforce_domain = false

[security]
disable_initial_admin_creation = false
admin_user = admin
admin_password = admin
cookie_secure = false
cookie_samesite = lax
allow_embedding = true

[users]
allow_sign_up = false
allow_org_create = false
; Yeni user'lar (auth-proxy ile gelen) otomatik bir org'a atansin â€”
; CalibraHub.Web GrafanaAuthProxyMiddleware her request'te X-Grafana-Org-Id
; header'i ile dogru org'u override eder (Calibra_{companyId}). Bu yuzden
; auto_assign_org_id default 1 (Main Org) fallback olarak kalir; gercek
; calismada middleware'in header'i etkindir.
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Editor
default_theme = dark

[auth]
disable_login_form = false
disable_signout_menu = false

[auth.basic]
; CalibraHub.Web GrafanaProvisioningService basic-auth (admin/admin DPAPI)
; ile Grafana'ya org/datasource/dashboard provisioning yapar. Bu yuzden
; basic auth AKTIF olmali â€” auth.proxy ile aynÄ± anda calisir, header
; varsa proxy, yoksa basic.
enabled = true

[auth.anonymous]
enabled = false

[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = username
auto_sign_up = true
sync_ttl = 60
whitelist = 127.0.0.1/32
headers = Email:X-WEBAUTH-EMAIL Name:X-WEBAUTH-NAME
enable_login_token = false

[log]
mode = file
level = info

[log.file]
log_rotate = true
max_lines = 100000
max_size_shift = 28
daily_rotate = true
max_days = 14

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[paths]
data = data
logs = data/log
plugins = data/plugins
provisioning = conf/provisioning

[snapshots]
external_enabled = false

; Legacy [alerting] Grafana 11+ icinde kaldirildi â€” sadece unified_alerting
; kullaniliyor. [alerting] enabled = true verilirse Grafana baslamiyor.
[unified_alerting]
enabled = true

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CalibraHub — Yeniden Bağlanılıyor</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
        /* CalibraHub temalı offline sayfası — sistem teması (prefers-color-scheme) takip eder */
        :root {
            color-scheme: light dark;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --accent: #6366f1;
            --accent-soft: rgba(99,102,241,0.12);
            --danger: #ef4444;
            --shadow: 0 24px 60px rgba(15,23,42,0.10), 0 0 0 1px rgba(15,23,42,0.04);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0a0d17;
                --surface: #111827;
                --text: #f1f5f9;
                --muted: #94a3b8;
                --border: rgba(255,255,255,0.06);
                --shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
            }
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; min-height: 100vh; min-height: 100dvh;
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px; line-height: 1.55;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        body {
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%; max-width: 460px;
            background: var(--surface); border-radius: 18px;
            box-shadow: var(--shadow);
            padding: 36px 32px 28px;
            text-align: center;
        }
        .logo {
            width: 56px; height: 56px; margin: 0 auto 18px;
            border-radius: 14px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 22px; color: #fff;
            box-shadow: 0 10px 24px rgba(99,102,241,0.30);
        }

       /* Uyuyan uydu — 3B render hissi veren SVG + animasyonlar */
        .satellite {
            width: 220px; height: 190px; margin: -8px auto 8px;
            display: block;
            filter: drop-shadow(0 16px 24px rgba(0,0,0,0.32));
            cursor: grab; user-select: none; touch-action: none;
            transition: transform .45s cubic-bezier(.34, 1.56, .64, 1);
        }
        .satellite.is-grabbed { transition: none; cursor: grabbing; }
        .sat-body { transform-origin: 110px 100px; animation: satBreathe 4s ease-in-out infinite; }
        @keyframes satBreathe {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50%      { transform: translateY(-3px) rotate(3deg); }
        }

        /* Peek — kullanıcı uyduya tıklayınca uykucu "biraz daha uyumak istiyorum"
           tepkisi: tıklanan tarafın aksine yüzünü çevirir, gözlerini hafif aralayıp
           tekrar kapatır. Breathing animasyonu peek süresince devre dışı. */
        .satellite.is-peeking .sat-body {
            animation: satPeekRight 1.6s cubic-bezier(.4,.0,.2,1) forwards;
        }
        .satellite.is-peeking.peek-left .sat-body {
            animation: satPeekLeft 1.6s cubic-bezier(.4,.0,.2,1) forwards;
        }
        @keyframes satPeekRight {
            0%   { transform: translateY(0) rotate(0deg); }
            18%  { transform: translateY(-2px) rotate(11deg); }
            55%  { transform: translateY(-2px) rotate(8deg); }
            100% { transform: translateY(0) rotate(-3deg); }
        }
        @keyframes satPeekLeft {
            0%   { transform: translateY(0) rotate(0deg); }
            18%  { transform: translateY(-2px) rotate(-11deg); }
            55%  { transform: translateY(-2px) rotate(-8deg); }
            100% { transform: translateY(0) rotate(-3deg); }
        }
        /* Gözler — kapalı default, peek sırasında hafif açık */
        .sat-eye-open { opacity: 0; transition: opacity .18s ease-out; }
        .satellite.is-peeking .sat-eye-closed { opacity: 0; transition: opacity .14s ease-in; }
        .satellite.is-peeking .sat-eye-open   { opacity: 1; }
        /* Peek bitiminin son ~20%'unde gözler tekrar kapansın */
        .satellite.is-peeking.peek-closing .sat-eye-closed { opacity: 1; transition: opacity .22s ease-out; }
        .satellite.is-peeking.peek-closing .sat-eye-open   { opacity: 0; transition: opacity .22s ease-in; }

        /* Click → ağız suyu silme: gözler aç → drool fade out → drool fade in → gözler kapa */
        .sat-drool { transition: opacity .35s ease-out; }
        .satellite.is-wiping .sat-drool { opacity: 0; }

        /* ── Anger overlay — drag esnasındaki çarpma hızına göre yüz değişir ──
           Seviye 0 (sakin) : uyuyan default
           Seviye 1         : gözler hafif açık (ağız suyu kaybolur)
           Seviye 2 (kızgın): X gözler + kırmızı yanaklar
           Seviye 3 (öfke)  : seviye 2 + tüm gövde vibrate
           Not: ?/! emote ve çatık kaşlar render edilmez (mizah yumuşak). */
        .sat-cheeks, .sat-angry-brows, .sat-eye-angry, .sat-emote { opacity: 0; transition: opacity .25s ease-out; }
        .satellite[data-anger="1"] .sat-eye-closed { opacity: 0; }
        .satellite[data-anger="1"] .sat-eye-open   { opacity: 1; }
        .satellite[data-anger="1"] .sat-drool      { opacity: 0; }
        .satellite[data-anger="2"] .sat-eye-closed { opacity: 0; }
        .satellite[data-anger="2"] .sat-eye-open   { opacity: 0; }
        .satellite[data-anger="2"] .sat-eye-angry  { opacity: 1; }
        .satellite[data-anger="2"] .sat-cheeks     { opacity: .85; }
        .satellite[data-anger="2"] .sat-drool      { opacity: 0; }
        .satellite[data-anger="3"] .sat-eye-closed { opacity: 0; }
        .satellite[data-anger="3"] .sat-eye-open   { opacity: 0; }
        .satellite[data-anger="3"] .sat-eye-angry  { opacity: 1; }
        .satellite[data-anger="3"] .sat-cheeks     { opacity: 1; }
        .satellite[data-anger="3"] .sat-drool      { opacity: 0; }

        /* Drag sırasında baş dönmesi — sat-body breathe yerine geniş yatay sallanma.
           Yüksek anger'da daha hızlı (override). */
        .satellite.is-grabbed .sat-body {
            animation: satDizzy .9s ease-in-out infinite;
        }
        .satellite.is-grabbed[data-anger="2"] .sat-body { animation-duration: .55s; }
        .satellite.is-grabbed[data-anger="3"] .sat-body { animation: satVibrate .11s steps(2) infinite; }
        .satellite[data-anger="3"]:not(.is-grabbed) .sat-body { animation: satVibrate .11s steps(2) infinite; }
        @keyframes satDizzy {
            0%   { transform: translateY(0)    rotate(-11deg); }
            50%  { transform: translateY(-3px) rotate(11deg); }
            100% { transform: translateY(0)    rotate(-11deg); }
        }
        @keyframes satVibrate {
            0%, 100% { transform: translate(-2px, 0) rotate(-3deg); }
            50%      { transform: translate(2px, -1px) rotate(3deg); }
        }

        /* Üst anten — fare yaklaşınca o tarafa eğilip "kovmaya çalışır".
           JS mousemove ile inline `transform: rotate(Xdeg)` set eder. */
        .sat-antenna-top {
            transform-box: fill-box;
            transform-origin: center bottom;
            transition: transform .12s ease-out;
        }

        .sat-antenna-light {
            fill: #ef4444; transform-origin: 100px 22px;
            animation: antBlink 1.6s ease-in-out infinite;
        }
        @keyframes antBlink {
            0%, 100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }

        h1 {
            margin: 0 0 6px; font-size: 18px; font-weight: 700; letter-spacing: -0.01em;
        }
        .subtitle {
            margin: 0 0 22px; font-size: 13px; color: var(--muted);
        }
        .actions {
            display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
        }
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border);
            background: transparent; color: var(--text);
            font-size: 13px; font-weight: 600; cursor: pointer;
            transition: background .12s, border-color .12s;
        }
        .btn:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .btn--primary {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .btn--primary:hover { background: #4f46e5; border-color: #4f46e5; color: #fff; }
        .footer {
            margin-top: 24px; padding-top: 18px;
            border-top: 1px solid var(--border);
            font-size: 11px; color: var(--muted);
        }
        .footer code {
            font-family: ui-monospace, Menlo, Consolas, monospace;
            background: var(--accent-soft); padding: 1px 5px; border-radius: 4px;
            font-size: 10px; color: var(--accent);
        }
    </style>
</head>
<body>
    <main class="card" role="status" aria-live="polite">
        <!-- Uyuyan uydu — 3B render benzeri SVG -->
        <svg class="satellite" viewBox="0 0 220 190" xmlns="http://www.w3.org/2000/svg" aria-label="Uyuyan uydu">
            <defs>
                <!-- Beyaz mat gövde gradient'i -->
                <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"  stop-color="#ffffff"/>
                    <stop offset="100%" stop-color="#cbd5e1"/>
                </linearGradient>
                <!-- Lacivert solar panel -->
                <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%"  stop-color="#334155"/>
                    <stop offset="100%" stop-color="#1e293b"/>
                </linearGradient>
                <!-- Anten ışık halesi -->
                <radialGradient id="lightGlow">
                    <stop offset="0%"  stop-color="#ef4444" stop-opacity="0.5"/>
                    <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
                </radialGradient>
            </defs>

            <g class="sat-body">
                <!-- Üst anten — fare yaklaşınca o yöne eğilip kovalar (JS mousemove → inline transform) -->
                <g class="sat-antenna-top">
                    <line x1="110" y1="40" x2="110" y2="22" stroke="#94a3b8" stroke-width="2.4" stroke-linecap="round"/>
                    <!-- Kırmızı ışık + halo (anten ucunda) -->
                    <circle cx="110" cy="22" r="10" fill="url(#lightGlow)"/>
                    <circle class="sat-antenna-light" cx="110" cy="22" r="3.5"/>
                </g>

                <!-- Sol solar panel kolu -->
                <rect x="50" y="79" width="14" height="4" rx="1" fill="#94a3b8"/>
                <!-- Sol solar panel -->
                <rect x="14" y="62" width="42" height="38" rx="3" fill="url(#panelGrad)" stroke="#475569" stroke-width="1"/>
                <line x1="28" y1="62" x2="28" y2="100" stroke="#64748b" stroke-width="0.8"/>
                <line x1="42" y1="62" x2="42" y2="100" stroke="#64748b" stroke-width="0.8"/>
                <line x1="14" y1="75" x2="56" y2="75" stroke="#64748b" stroke-width="0.8"/>
                <line x1="14" y1="87" x2="56" y2="87" stroke="#64748b" stroke-width="0.8"/>

                <!-- Sağ solar panel kolu -->
                <rect x="156" y="79" width="14" height="4" rx="1" fill="#94a3b8"/>
                <!-- Sağ solar panel -->
                <rect x="164" y="62" width="42" height="38" rx="3" fill="url(#panelGrad)" stroke="#475569" stroke-width="1"/>
                <line x1="178" y1="62" x2="178" y2="100" stroke="#64748b" stroke-width="0.8"/>
                <line x1="192" y1="62" x2="192" y2="100" stroke="#64748b" stroke-width="0.8"/>
                <line x1="164" y1="75" x2="206" y2="75" stroke="#64748b" stroke-width="0.8"/>
                <line x1="164" y1="87" x2="206" y2="87" stroke="#64748b" stroke-width="0.8"/>

                <!-- Gövde -->
                <rect x="70" y="40" width="80" height="80" rx="12" fill="url(#bodyGrad)" stroke="#94a3b8" stroke-width="1"/>
                <!-- Sol cıvatalar -->
                <circle cx="78" cy="48" r="2" fill="#94a3b8"/>
                <circle cx="78" cy="112" r="2" fill="#94a3b8"/>
                <circle cx="142" cy="48" r="2" fill="#94a3b8"/>
                <circle cx="142" cy="112" r="2" fill="#94a3b8"/>

                <!-- Yüz ekranı (hafif çerçeve) -->
                <rect x="82" y="56" width="56" height="46" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="0.8"/>

                <!-- Uyuyan kapalı gözler (default görünür) -->
                <g class="sat-eye-closed">
                    <path d="M92 75 Q99 70 106 75" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M114 75 Q121 70 128 75" stroke="#475569" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                </g>
                <!-- Hafif aralık gözler — peek + anger=1 sırasında görünür -->
                <g class="sat-eye-open">
                    <ellipse cx="99" cy="74" rx="3" ry="2.2" fill="#475569"/>
                    <ellipse cx="121" cy="74" rx="3" ry="2.2" fill="#475569"/>
                    <path d="M93 72 Q99 70 105 72" stroke="#475569" stroke-width="1.6" fill="none" stroke-linecap="round"/>
                    <path d="M115 72 Q121 70 127 72" stroke="#475569" stroke-width="1.6" fill="none" stroke-linecap="round"/>
                </g>
                <!-- Kızgın gözler (X şekli) — anger=2,3 sırasında görünür -->
                <g class="sat-eye-angry">
                    <path d="M93 71 L105 78" stroke="#1e293b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M105 71 L93 78" stroke="#1e293b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M115 71 L127 78" stroke="#1e293b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                    <path d="M127 71 L115 78" stroke="#1e293b" stroke-width="2.4" fill="none" stroke-linecap="round"/>
                </g>
                <!-- Çatık kaşlar — anger=2,3 sırasında görünür -->
                <g class="sat-angry-brows">
                    <line x1="92" y1="64" x2="105" y2="70" stroke="#1e293b" stroke-width="2.6" stroke-linecap="round"/>
                    <line x1="128" y1="64" x2="115" y2="70" stroke="#1e293b" stroke-width="2.6" stroke-linecap="round"/>
                </g>
                <!-- Kırmızı yanaklar — anger=2,3 sırasında belirir -->
                <g class="sat-cheeks">
                    <ellipse cx="89" cy="86" rx="5" ry="3" fill="#ef4444" opacity="0.6"/>
                    <ellipse cx="131" cy="86" rx="5" ry="3" fill="#ef4444" opacity="0.6"/>
                </g>

                <!-- Açık ağız (üzgün/uykulu) -->
                <ellipse cx="110" cy="92" rx="5" ry="4" fill="#334155"/>
                <!-- Ağız suyu izi — statik. Click sırasında is-wiping ile fade out / fade in. -->
                <g class="sat-drool">
                    <path d="M114 94 Q117 99 116 104" stroke="#7dd3fc" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>
                    <circle cx="116" cy="106" r="1.8" fill="#7dd3fc" opacity="0.9"/>
                </g>

            </g>

            <!-- Emote ?/! — anger seviyesine göre sağ üstte görünür -->
            <text class="sat-emote sat-emote--q" x="172" y="58" font-size="22" font-weight="800" fill="#f59e0b">?</text>
            <text class="sat-emote sat-emote--e" x="174" y="58" font-size="26" font-weight="900" fill="#ef4444">!</text>
        </svg>

        <h1>Sunucuya bağlanılamıyor</h1>
        <p class="subtitle">Hizmetimiz kısa bir uyku molasında. Bağlantı kurulur kurulmaz sayfanız otomatik olarak açılacaktır.</p>

        <div class="actions">
            <button type="button" class="btn btn--primary" onclick="checkNow()">Şimdi Tekrar Dene</button>
        </div>
    </main>

    <script>
    (function () {
        // Bu sayfa service-worker tarafından servis edilir; orijinal navigation target'ı:
        //   1) URL query param '?to=...' (SW yazar)
        //   2) sessionStorage 'calibra:offlineTarget' (fallback)
        //   3) location.pathname (deep open)
        var target = (function () {
            try {
                var params = new URLSearchParams(location.search);
                var t1 = params.get('to');
                if (t1) {
                    try { sessionStorage.setItem('calibra:offlineTarget', t1); } catch (_) {}
                    return t1;
                }
                var t2 = sessionStorage.getItem('calibra:offlineTarget');
                if (t2) return t2;
            } catch (_) {}
            return location.pathname + location.search;
        })();

        var PROBE_INTERVAL = 10000; // ms
        var checking = false;
        var timerId = null;

        async function probe() {
            if (checking) return;
            checking = true;
            try {
                var r = await fetch('/?_probe=' + Date.now(), {
                    method: 'GET', credentials: 'same-origin', cache: 'no-store',
                    headers: { 'Accept': 'text/html', 'X-Offline-Probe': '1' }
                });
                if (r.status >= 200 && r.status < 600) {
                    try { sessionStorage.removeItem('calibra:offlineTarget'); } catch (_) {}
                    setTimeout(function () { location.replace(target || '/'); }, 400);
                    return;
                }
            } catch (_) {}
            checking = false;
        }

        // ── Uydu etkileşimleri ────────────────────────────────────────
        var satEl = document.querySelector('.satellite');
        if (satEl) {
            // Üst anten fareyi takip eder — kovmaya çalışır havası.
            // SVG koordinatına mouse mapping: anten kökü viewBox'ta (110, 40).
            var antennaTop = satEl.querySelector('.sat-antenna-top');
            var VB_W = 220;
            satEl.addEventListener('mousemove', function (e) {
                if (!antennaTop || dragging) return;
                var r = satEl.getBoundingClientRect();
                var scaleX = r.width / VB_W;
                var mx = (e.clientX - r.left) / scaleX;
                // Anten kökünden (110) yatay mesafe → eğilme açısı.
                // Pozitif → sağa, negatif → sola; ±55° clamp.
                var angle = (mx - 110) * 0.5;
                angle = Math.max(-55, Math.min(55, angle));
                antennaTop.style.transform = 'rotate(' + angle.toFixed(1) + 'deg)';
            });
            satEl.addEventListener('mouseleave', function () {
                if (antennaTop) antennaTop.style.transform = '';
            });

            // ── Drag + Anger ─────────────────────────────────────────────
            // Uydu drag edilebilir. Çarpma hızı (px/ms) → anger += vx*6 (max 14/step).
            // Drag bırakılınca anger her frame -0.8 azalır → 0'a düşünce tekrar uyuyan moda.
            // Seviyeler:
            //   0..14   : sakin (default uyuyan)
            //   15..39  : "?" — gözler yarı açık
            //   40..69  : kızgın — kaş çatık, X gözler, kırmızı yanaklar, "!"
            //   70..100 : öfke — yukarısı + tüm gövde vibrate
            var anger = 0;
            var ANGER_MAX = 100;
            var dragging = false;
            var dragStartX = 0;
            var lastX = 0, lastT = 0;
            var dragMoveTotal = 0;
            var rafId = null;

            function angerStage(a) {
                if (a >= 70) return 3;
                if (a >= 40) return 2;
                if (a >= 15) return 1;
                return 0;
            }
            function applyAngerDom() {
                var s = angerStage(anger);
                if (s === 0) satEl.removeAttribute('data-anger');
                else satEl.setAttribute('data-anger', String(s));
            }
            function angerLoop() {
                if (!dragging) {
                    anger = Math.max(0, anger - 0.8);
                }
                applyAngerDom();
                if (dragging || anger > 0.5) {
                    rafId = requestAnimationFrame(angerLoop);
                } else {
                    anger = 0;
                    rafId = null;
                }
            }
            function ensureLoop() {
                if (rafId == null) rafId = requestAnimationFrame(angerLoop);
            }

            satEl.addEventListener('pointerdown', function (e) {
                if (e.pointerType === 'mouse' && e.button !== 0) return;
                dragging = true;
                satEl.classList.add('is-grabbed');
                dragStartX = e.clientX;
                lastX = e.clientX;
                lastT = performance.now();
                dragMoveTotal = 0;
                try { satEl.setPointerCapture(e.pointerId); } catch (_) {}
                ensureLoop();
            });

            satEl.addEventListener('pointermove', function (e) {
                if (!dragging) return;
                var now = performance.now();
                var dt = Math.max(1, now - lastT);
                var dx = e.clientX - lastX;
                var vx = Math.abs(dx) / dt;   // px/ms
                if (vx > 0.25) {
                    // çarpma hızına göre öfke artışı (cap'li step)
                    anger = Math.min(ANGER_MAX, anger + Math.min(vx * 6, 14));
                }
                var offset = e.clientX - dragStartX;
                offset = Math.max(-110, Math.min(110, offset));
                satEl.style.transform = 'translateX(' + offset + 'px)';
                dragMoveTotal += Math.abs(dx);
                lastX = e.clientX;
                lastT = now;
            });

            function dropDrag(e) {
                if (!dragging) return;
                dragging = false;
                satEl.classList.remove('is-grabbed');
                satEl.style.transform = '';   // CSS transition spring-back
                if (e && e.pointerId != null) {
                    try { satEl.releasePointerCapture(e.pointerId); } catch (_) {}
                }
            }
            satEl.addEventListener('pointerup', dropDrag);
            satEl.addEventListener('pointercancel', dropDrag);

            // Tıklanınca: gözler aç → ağız suyu silinir → gözler kapanır
            // Drag → click suppress (5 px üzeri hareket varsa peek tetiklenmez).
            satEl.addEventListener('click', function (e) {
                if (dragMoveTotal > 5) return;
                if (satEl.classList.contains('is-peeking')) return;
                var rect = satEl.getBoundingClientRect();
                var clickedOnLeft = (e.clientX - rect.left) < rect.width / 2;
                if (clickedOnLeft) satEl.classList.remove('peek-left');
                else               satEl.classList.add('peek-left');
                satEl.classList.add('is-peeking');
                setTimeout(function () { satEl.classList.add('is-wiping'); }, 400);
                setTimeout(function () { satEl.classList.add('peek-closing'); }, 1200);
                setTimeout(function () {
                    satEl.classList.remove('is-peeking', 'peek-left', 'peek-closing', 'is-wiping');
                }, 1650);
            });
        }

        function start() {
            if (timerId) return;
            probe();
            timerId = setInterval(probe, PROBE_INTERVAL);
        }

        window.checkNow = function () {
            if (timerId) { clearInterval(timerId); timerId = null; }
            start();
        };

        start();
    })();
    </script>
</body>
</html>
